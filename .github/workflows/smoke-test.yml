name: Smoke Test

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bin
          suffix=""
          if [ "${{ runner.os }}" = "Windows" ]; then
            suffix=".exe"
          fi
          go build -trimpath -o "bin/teams-migrator${suffix}" ./cmd/teams-migrator

      - name: Smoke test on Linux/macOS
        if: runner.os != 'Windows'
        shell: bash
        env:
          TEAMS_MIGRATOR_SKIP_UPDATE_CHECK: "1"
        run: |
          set -euo pipefail
          ./bin/teams-migrator version
          ./bin/teams-migrator config show

      - name: Smoke test on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TEAMS_MIGRATOR_SKIP_UPDATE_CHECK: "1"
        run: |
          ./bin/teams-migrator.exe version
          ./bin/teams-migrator.exe config show
